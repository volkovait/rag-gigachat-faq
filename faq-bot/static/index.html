<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FAQ-бот — база знаний</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f1f5f9;
      --border: #cbd5e1;
      --accent: #475569;
      --accent-hover: #1e293b;
      --text: #1e293b;
      --input-bg: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans Mono", ui-monospace, monospace;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 1.5rem;
      letter-spacing: -0.02em;
    }
    .tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--border);
    }
    .tab {
      flex: 1;
      padding: 0.65rem 1rem;
      border: none;
      background: #e2e8f0;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-right: 1px solid var(--border);
    }
    .tab:last-child { border-right: none; }
    .tab:hover { background: #dbe4ee; }
    .tab.active {
      background: var(--bg);
      font-weight: 600;
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    .panel {
      display: none;
      border: 1px solid var(--border);
      padding: 1.25rem;
      background: var(--bg);
    }
    .panel.active { display: block; }
    label {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
    }
    textarea, input[type="text"] {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--border);
      padding: 0.65rem 0.75rem;
      border-radius: 2px;
    }
    textarea { min-height: 200px; resize: vertical; }
    input[type="text"] { margin-bottom: 0.75rem; }
    .row { margin-top: 1rem; }
    .btn {
      font-family: inherit;
      font-size: 13px;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      border-radius: 2px;
    }
    .btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: transparent;
      color: var(--accent);
      margin-left: 0.5rem;
    }
    .btn-secondary:hover {
      background: var(--border);
      color: var(--accent-hover);
      border-color: var(--border);
    }
    .status {
      margin-top: 0.75rem;
      font-size: 13px;
      color: var(--accent);
    }
    .hint {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12px;
      color: var(--accent);
    }
    .warn-box {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12px;
    }
    .warn-box strong { color: var(--accent-hover); }
    .answer {
      margin-top: 1rem;
      padding: 1rem;
      border: 1px solid var(--border);
      background: #fff;
      white-space: pre-wrap;
      font-size: 13px;
    }
    .err {
      margin-top: 0.75rem;
      color: #b91c1c;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>FAQ-бот</h1>
    <div class="tabs" role="tablist">
      <button type="button" class="tab active" data-tab="kb" role="tab" aria-selected="true">База знаний</button>
      <button type="button" class="tab" data-tab="chat" role="tab" aria-selected="false">Чат</button>
    </div>
    <div id="panel-kb" class="panel active" role="tabpanel">
      <label for="kb-text">Текст для индексации</label>
      <textarea id="kb-text" placeholder="Вставьте правила, регламент или другой текст…"></textarea>
      <div class="row">
        <button type="button" class="btn" id="btn-index">Загрузить</button>
      </div>
      <div class="status" id="kb-status"></div>
      <div class="hint">Чтобы задать вопрос по загруженному тексту, перейдите на вкладку «Чат».</div>
      <div class="err" id="kb-err"></div>
    </div>
    <div id="panel-chat" class="panel" role="tabpanel">
      <label for="q-input">Вопрос</label>
      <input type="text" id="q-input" placeholder="Формулировка вопроса…" autocomplete="off" />
      <button type="button" class="btn" id="btn-prepare">Спросить</button>
      <div id="prepare-block" style="display:none;">
        <div class="warn-box" id="token-line"></div>
        <div class="warn-box" id="warn-line"></div>
        <div class="row">
          <button type="button" class="btn" id="btn-ask">Отправить в модель</button>
          <button type="button" class="btn btn-secondary" id="btn-cancel">Отмена</button>
        </div>
      </div>
      <div class="answer" id="answer-out" style="display:none;"></div>
      <div class="err" id="chat-err"></div>
    </div>
  </div>
  <script>
    (function () {
      var prepareId = null;

      function $(id) { return document.getElementById(id); }

      function showTab(name) {
        var tabs = document.querySelectorAll(".tab");
        var kb = $("panel-kb");
        var chat = $("panel-chat");
        tabs.forEach(function (t) {
          var on = t.getAttribute("data-tab") === name;
          t.classList.toggle("active", on);
          t.setAttribute("aria-selected", on ? "true" : "false");
        });
        kb.classList.toggle("active", name === "kb");
        chat.classList.toggle("active", name === "chat");
      }

      document.querySelectorAll(".tab").forEach(function (btn) {
        btn.addEventListener("click", function () {
          showTab(btn.getAttribute("data-tab"));
        });
      });

      function api(path, body) {
        return fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        }).then(function (r) {
          return r.text().then(function (t) {
            var j = {};
            try {
              j = t ? JSON.parse(t) : {};
            } catch (e) {
              throw new Error(r.status + " " + (t || r.statusText));
            }
            if (!r.ok) throw new Error(j.error || r.statusText);
            return j;
          });
        });
      }

      $("btn-index").addEventListener("click", function () {
        var text = $("kb-text").value;
        $("kb-err").textContent = "";
        $("kb-status").textContent = "Загрузка…";
        $("btn-index").disabled = true;
        api("/index", { text: text })
          .then(function (res) {
            $("kb-status").textContent = "Загружено " + res.chunks + " чанков";
          })
          .catch(function (e) {
            $("kb-status").textContent = "";
            $("kb-err").textContent = e.message || String(e);
          })
          .finally(function () {
            $("btn-index").disabled = false;
          });
      });

      function resetPrepare() {
        prepareId = null;
        $("prepare-block").style.display = "none";
        $("token-line").textContent = "";
        $("warn-line").textContent = "";
      }

      $("btn-cancel").addEventListener("click", resetPrepare);

      $("btn-prepare").addEventListener("click", function () {
        var q = $("q-input").value.trim();
        $("chat-err").textContent = "";
        $("answer-out").style.display = "none";
        $("answer-out").textContent = "";
        resetPrepare();
        if (!q) {
          $("chat-err").textContent = "Введите вопрос.";
          return;
        }
        $("btn-prepare").disabled = true;
        api("/prepare", { question: q })
          .then(function (res) {
            prepareId = res.prepare_id;
            $("prepare-block").style.display = "block";
            $("token-line").innerHTML =
              "Оценка входных токенов для запроса к модели чата: <strong>≈ " +
              res.estimated_prompt_tokens +
              "</strong> (приблизительно).";
            $("warn-line").textContent = res.warning || "";
          })
          .catch(function (e) {
            $("chat-err").textContent = e.message || String(e);
          })
          .finally(function () {
            $("btn-prepare").disabled = false;
          });
      });

      $("btn-ask").addEventListener("click", function () {
        if (!prepareId) {
          $("chat-err").textContent = "Сначала нажмите «Спросить».";
          return;
        }
        $("chat-err").textContent = "";
        $("btn-ask").disabled = true;
        api("/ask", { prepare_id: prepareId })
          .then(function (res) {
            $("answer-out").style.display = "block";
            $("answer-out").textContent = res.answer;
            resetPrepare();
          })
          .catch(function (e) {
            $("chat-err").textContent = e.message || String(e);
            resetPrepare();
          })
          .finally(function () {
            $("btn-ask").disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
